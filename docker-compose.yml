version: "3"
services:
  postgres1:
    image: postgres:15
    container_name: postgres_container1
    restart: always
    environment:
      POSTGRES_DB: ctis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/data
    networks:
      - app_network
  postgres2:
    image: postgres:15
    container_name: postgres_container2
    restart: always
    environment:
      POSTGRES_DB: ctis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/data
    networks:
      - app_network
  postgres3:
    image: postgres:15
    container_name: postgres_container3
    restart: always
    environment:
      POSTGRES_DB: ctis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/data
    networks:
      - app_network
  postgres4:
    image: postgres:15
    container_name: postgres_container4
    restart: always
    environment:
      POSTGRES_DB: ctis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5435:5432"
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/data
    networks:
      - app_network
  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: always
    command: [
      '--lower_case_table_names=1',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION',
    ]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "3306:3306"
    volumes:
      - ./db_data/mysql:/var/lib/mysql
    networks:
      - app_network
  redis:
    image: redis:latest
    container_name: redis_container
    restart: always
    command: [ ]
    environment:
      REDIS_PORT: "6379"
    ports:
      - "6379:6379"
    volumes:
      - ./db_data/redis:/data
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge